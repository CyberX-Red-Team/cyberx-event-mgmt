{% extends "layouts/auth.html" %}

{% block title %}Set New Password{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card shadow-lg border-0 rounded-lg mt-5">
                <div class="card-body">
                    <div class="text-center pt-4 pb-3">
                        <img src="/static/img/cyberx-star-logo.svg" alt="CyberX" style="width: 48px; height: 48px;" class="mb-3">
                        <h3 class="fw-light">Set New Password</h3>
                    </div>

                    <div id="alertContainer"></div>

                    <form id="resetForm">
                        <div class="mb-3">
                            <label class="small mb-1" for="newPassword">New Password</label>
                            <input class="form-control" id="newPassword" type="password"
                                   placeholder="Enter new password" required minlength="8" autofocus />
                        </div>
                        <div class="mb-3">
                            <label class="small mb-1" for="confirmPassword">Confirm Password</label>
                            <input class="form-control" id="confirmPassword" type="password"
                                   placeholder="Confirm new password" required minlength="8" />
                        </div>
                        <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                            <a class="small" href="/login">Back to Login</a>
                            <button type="submit" class="btn btn-primary" id="submitBtn">Reset Password</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center py-3">
                    <div class="small text-muted">
                        CyberX Event Management System
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
(function() {
    var params = new URLSearchParams(window.location.search);
    var token = params.get('token');

    if (!token) {
        document.getElementById('alertContainer').innerHTML =
            '<div class="alert alert-danger">' +
                'Missing reset token. <a href="/forgot-password">Request a new reset link</a>.' +
            '</div>';
        document.getElementById('resetForm').style.display = 'none';
        return;
    }

    document.getElementById('resetForm').addEventListener('submit', async function(e) {
        e.preventDefault();

        var newPassword = document.getElementById('newPassword').value;
        var confirmPassword = document.getElementById('confirmPassword').value;
        var btn = document.getElementById('submitBtn');
        var container = document.getElementById('alertContainer');
        container.innerHTML = '';

        if (newPassword !== confirmPassword) {
            container.innerHTML =
                '<div class="alert alert-danger">Passwords do not match.</div>';
            return;
        }

        btn.disabled = true;
        btn.textContent = 'Resetting...';

        try {
            var response = await csrfFetch('/api/auth/password/reset/complete', {
                method: 'POST',
                body: { token: token, new_password: newPassword }
            });

            var data = await response.json();

            if (response.ok) {
                container.innerHTML =
                    '<div class="alert alert-success">' +
                        '<i class="fas fa-check-circle me-2"></i>' +
                        'Password reset successfully. Redirecting to login...' +
                    '</div>';
                document.getElementById('resetForm').style.display = 'none';
                setTimeout(function() { window.location.href = '/login'; }, 3000);
            } else {
                container.innerHTML =
                    '<div class="alert alert-danger">' +
                        (data.detail || 'Invalid or expired token.') +
                        ' <a href="/forgot-password">Request a new reset link</a>.' +
                    '</div>';
                btn.disabled = false;
                btn.textContent = 'Reset Password';
            }
        } catch (error) {
            container.innerHTML =
                '<div class="alert alert-danger">' +
                    'Something went wrong. Please try again.' +
                '</div>';
            btn.disabled = false;
            btn.textContent = 'Reset Password';
        }
    });
})();
</script>
{% endblock %}
