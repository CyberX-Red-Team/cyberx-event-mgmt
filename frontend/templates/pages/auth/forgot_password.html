{% extends "layouts/auth.html" %}

{% block title %}Forgot Password{% endblock %}

{% block content %}
<div class="container">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="card cyber-card border-0 mt-5">
                <div class="card-body">
                    <div class="text-center pt-4 pb-2">
                        <img src="/static/img/cyberx-star-logo.svg" alt="CyberX" style="width: 56px; height: 56px;" class="mb-3 cyber-logo">
                        <h3 class="cyber-title">Reset Password</h3>
                        <p class="small mt-2" style="color: rgba(255,255,255,0.4);">Enter your email address and we'll send you a reset link.</p>
                    </div>

                    <div id="alertContainer"></div>

                    <form id="forgotForm" class="mt-3">
                        <div class="mb-3">
                            <label class="small mb-1" for="email">Email Address</label>
                            <input class="form-control" id="email" name="email" type="email"
                                   placeholder="Enter your email address" required autofocus />
                        </div>
                        <div class="d-flex align-items-center justify-content-between mt-4 mb-0">
                            <a class="small" href="/login">Back to Login</a>
                            <button type="submit" class="btn btn-cyber" id="submitBtn">Send Reset Link</button>
                        </div>
                    </form>
                </div>
                <div class="card-footer text-center py-3">
                    <div class="small text-muted">
                        CyberX Event Management System
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}

{% block extra_js %}
<script>
document.getElementById('forgotForm').addEventListener('submit', async function(e) {
    e.preventDefault();

    var btn = document.getElementById('submitBtn');
    var container = document.getElementById('alertContainer');
    btn.disabled = true;
    btn.textContent = 'Sending...';
    container.innerHTML = '';

    try {
        var response = await csrfFetch('/api/auth/password/reset/request', {
            method: 'POST',
            body: { email: document.getElementById('email').value }
        });

        var data = await response.json();

        container.innerHTML =
            '<div class="alert alert-success">' +
                '<i class="fas fa-check-circle me-2"></i>' +
                'If an account with that email exists, a password reset link has been sent. Please check your inbox.' +
            '</div>';
        document.getElementById('forgotForm').querySelector('.mb-3').style.display = 'none';
        btn.style.display = 'none';
    } catch (error) {
        container.innerHTML =
            '<div class="alert alert-danger">' +
                'Something went wrong. Please try again.' +
            '</div>';
        btn.disabled = false;
        btn.textContent = 'Send Reset Link';
    }
});
</script>
{% endblock %}
